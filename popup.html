<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    font-family: sans-serif;
    padding: 16px;
    background-color: #282828;
    color: #FF640A;
    min-width: 240px;
}
.content {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.feat-item {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: space-between;
}
input[type="checkbox"] {
    position: absolute;
    left: -9999px;
}
.toggle-label {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
    cursor: pointer;
}
.toggle-label::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #444;
    border-radius: 20px;
    transition: background 0.3s;
}
.toggle-label::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: #f0f0f0;
    border-radius: 50%;
    transition: transform 0.3s;
}
input[type="checkbox"]:checked + .toggle-label::before { background: #4caf50; }
input[type="checkbox"]:checked + .toggle-label::after { transform: translateX(22px); }
input[type="color"] {
    width: 44px;
    height: 28px;
    padding: 0;
    border: none;
    background: none;
}
#reset-colors {
    padding: 6px 10px;
    background: #444;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
</style>
<script src="popup.js" defer></script>
</head>
<body>
  <div class="content">
    <h1 style="margin:0 0 6px 0;font-size:16px;">CR-Toolkit</h1>

    <div class="feat-item">
      <span style="font-weight:bold;font-size:13px;">Player Resize</span>
      <div>
        <input type="checkbox" id="toggle">
        <label for="toggle" class="toggle-label" aria-hidden="true"></label>
      </div>
    </div>

    <h2 style="margin:8px 0 4px 0;font-size:14px;">Colors</h2>

    <div class="feat-item">
      <label for="input-accent">Accent</label>
      <input type="color" id="input-accent" title="Accent color">
    </div>

    <div style="display:flex;justify-content:center;margin-top:6px;">
      <button id="reset-colors">Reset</button>
    </div>
  </div>
</body>
</html>
