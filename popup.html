<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
    --primary-accent: #FF640A;
    --secondary-accent: #b7183e;
}


body {
    font-family: sans-serif;
    padding: 10px;
    background-color: #282828;
    color: var(--primary-accent);
    width: 250px;
    height: 500px;
    display: flex;
}

.content {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 10px;
}

.content h1 {
    text-align: center;
    font-size: 35px;
}

.content span {
    text-align: left;
    font-size: 20px;
}

#footer {
    text-align: center;
    font-size: 15px;
}

.content a {
    color: var(--primary-accent);
    text-decoration: none;
}

.content a:hover {
    color: var(--secondary-accent);
}

.section {
    width: 100%;
    border: 1px solid var(--primary-accent);
    height: 380px;
    overflow: auto;
    margin: 0 auto;
}

.feat-item {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    padding: 10px;
    width: auto;
    align-items: center;
    margin-bottom: 1rem;
}

/* Checkbox verstecken */
input[type="checkbox"] {
    display: none;
}

/* Toggle-Stil */
.toggle-label {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
    cursor: pointer;
}

.toggle-label::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #444;
    border-radius: 20px;
    transition: background 0.3s;
}

.toggle-label::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: #f0f0f0;
    border-radius: 50%;
    transition: transform 0.3s;
}

input[type="checkbox"]:checked + .toggle-label::before {
    background: #4caf50;
}

input[type="checkbox"]:checked + .toggle-label::after {
    transform: translateX(22px);
}

/* Text */
.toggle-text {
    font-size: 16px;
    user-select: none;
    font-weight: bold;
}
</style>
</head>

<body>
    <div class="content">
        <h1>CR Toolkit</h1>
        <div class="section" id="s-general">
            <div class="feat-item">
                <span class="toggle-text">Player Resize</span>
                <input type="checkbox" id="toggle-player-resize">
                <label for="toggle-player-resize" class="toggle-label"></label>
            </div>
            <div class="feat-item">
                <span class="toggle-text">Auto Skip OP/ED</span>
                <input type="checkbox" id="toggle-auto-skip">
                <label for="toggle-auto-skip" class="toggle-label"></label>
            </div>
        </div>
        <span id="footer">Made with ❤️ by <a href="https://darkplugins.de" target="_blank">DarkPlugins</a></span>
    </div>

<script src="popup.js"></script>
</body>
</html>
