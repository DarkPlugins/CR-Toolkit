<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
    --primary-accent: #FF640A;
    --secondary-accent: #b7183e;
}

body {
    display: flex;
    width: 400px;
    height: 500px;
    padding: 10px;
    font-family: sans-serif;
    background-color: #282828;
    color: var(--primary-accent);
}

.content {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 10px;
}

.content h1 {
    text-align: center;
    font-size: 35px;
    margin-bottom: 0;
}

.content span {
    text-align: left;
    font-size: 20px;
}

#footer {
    text-align: center;
    font-size: 15px;
}

.content a {
    color: var(--primary-accent);
    text-decoration: none;
}

.content a:hover {
    color: var(--secondary-accent);
}

.navbar {
    display: flex;
    gap: 1rem;
}

.nav-btn {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--primary-accent);
    border-radius: 10px;
    color: var(--primary-accent);
    cursor: pointer;
}

.nav-btn.active {
    background: var(--primary-accent);
    color: #282828;
    font-weight: bold;
}

.section-container {
    width: 100%;
    border: 1px solid var(--primary-accent);
    border-radius: 10px;
    height: 380px;
    overflow: hidden;
}

.section-page {
    display: none;
    width: 100%;
    height: 100%;
    overflow: auto;
}

.section-page.active {
    display: block;
}

.feat-item {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    padding: 10px;
    width: auto;
    align-items: center;
}

.feat-head-multi {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    width: 100%;
}

.feat-item button {
    width: 30px;
    height: 30px;
    border-radius: 100%;
    border: 1px solid var(--secondary-accent);
    background-color: var(--primary-accent);
    color: black;
}

.feat-item button:hover {
    transition: background-color, border 0.2s;
    cursor: pointer;
    border: 1px solid var(--primary-accent);
    background-color: var(--secondary-accent);
}

.list {
    width: 300px;
    max-height: 210px;
    margin: 10px;
    padding: 10px;
    border: 1px solid var(--primary-accent);
    text-align: center;
    overflow: auto;
}

.list .small {
    font-size: 15px;
}

.color-row {
    display: flex;
    flex-direction: row;
    justify-content: space-around;
    align-items: center;
    margin: 10px;
    border: none;
      border-radius: 0;
      padding: 0;
}

input[type="color"] {
    border: 1x solid transparent;
    width: 60px;
    height: 30px;
    border-radius: 5px;
    padding: 0;
    border: 1px solid var(--primary-accent);
    background-color: transparent;
}

input[type="color"]::-moz-color-swatch {
  border: none;
}

input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
  border-radius: 0;
}

input[type="color"]::-webkit-color-swatch {
  border: none;
}

.child {
    margin-left: 1rem;
}

input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
}

.toggle-label {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
    cursor: pointer;
}

.toggle-label::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #444;
    border-radius: 20px;
    transition: background 0.3s;
}

.toggle-label::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: #f0f0f0;
    border-radius: 50%;
    transition: transform 0.3s;
}

input[type="checkbox"]:checked + .toggle-label::before {
    background: #4caf50;
}

input[type="checkbox"]:checked + .toggle-label::after {
    transform: translateX(22px);
}

.toggle-text {
    font-size: 16px;
    user-select: none;
    font-weight: bold;
}
</style>
</head>

<body>
    <div class="content">
        <h1>CR Toolkit</h1>

        <div class="navbar">
            <button class="nav-btn" data-section="s-general">
                General
            </button>

            <button class="nav-btn" data-section="s-appearance">
                Appearance
            </button>

            <button class="nav-btn" data-section="s-options">
                Options
            </button>
        </div>

        <div class="section-container">
            <div class="section-page" id="s-general">
                <div class="feat-item">
                    <span class="toggle-text">Player Resize</span>
                    <input type="checkbox" id="toggle-player-resize">
                    <label for="toggle-player-resize" class="toggle-label"></label>
                </div>

                <div class="feat-item">
                    <span class="toggle-text">Auto Skip OP/ED</span>
                    <input type="checkbox" id="toggle-auto-skip">
                    <label for="toggle-auto-skip" class="toggle-label"></label>
                </div>
            </div>

            <div class="section-page" id="s-appearance">
                <div class="feat-item" style="flex-direction: column;">
                    <div class="feat-head-multi">
                        <span class="toggle-text">Colors</span>
                        <button id="btn-add-color">+</button>
                    </div>
                    <div class="list" id="list-colors">
                        <span class="small">Add the colors you want to change</span>
                    </div>
                </div>

                <div class="feat-item">
                    <span class="toggle-text">Hide Header on Playback</span>
                    <input type="checkbox" id="toggle-hide-header">
                    <label for="toggle-hide-header" class="toggle-label"></label>
                </div>

                <div class="feat-item">
                    <span class="toggle-text">Change Header</span>
                    <input type="checkbox" id="toggle-change-header">
                    <label for="toggle-change-header" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: Logo</span>
                    <input type="checkbox" id="toggle-change-header-logo">
                    <label for="toggle-change-header-logo" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: New</span>
                    <input type="checkbox" id="toggle-change-header-new">
                    <label for="toggle-change-header-new" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: Popular</span>
                    <input type="checkbox" id="toggle-change-header-popular">
                    <label for="toggle-change-header-popular" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: Simulcast</span>
                    <input type="checkbox" id="toggle-change-header-simulcast">
                    <label for="toggle-change-header-simulcast" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: Categories</span>
                    <input type="checkbox" id="toggle-change-header-categories">
                    <label for="toggle-change-header-categories" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: Games</span>
                    <input type="checkbox" id="toggle-change-header-games">
                    <label for="toggle-change-header-games" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: Store</span>
                    <input type="checkbox" id="toggle-change-header-store">
                    <label for="toggle-change-header-store" class="toggle-label"></label>
                </div>

                <div class="feat-item child">
                    <span class="toggle-text">Remove: News</span>
                    <input type="checkbox" id="toggle-change-header-news">
                    <label for="toggle-change-header-news" class="toggle-label"></label>
                </div>
            </div>

            <div class="section-page" id="s-options">

            </div>
        </div>

        <span id="footer">
            Made with ❤️ by
            <a href="https://darkplugins.de" target="_blank">DarkPlugins</a>
        </span>
    </div>

<script src="popup.js"></script>
</body>
</html>
