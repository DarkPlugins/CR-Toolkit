<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
/* Dark Mode Hintergrund */
body {
    font-family: sans-serif;
    padding: 20px;
    background-color: #282828;
    color: #FF640A;
    min-width: 180px;
    min-height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

/* Checkbox verstecken */
input[type="checkbox"] {
    display: none;
}

/* Toggle-Stil */
.toggle-label {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
    cursor: pointer;
}

.toggle-label::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #444;
    border-radius: 20px;
    transition: background 0.3s;
}

.toggle-label::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: #f0f0f0;
    border-radius: 50%;
    transition: transform 0.3s;
}

input[type="checkbox"]:checked + .toggle-label::before {
    background: #4caf50;
}

input[type="checkbox"]:checked + .toggle-label::after {
    transform: translateX(22px);
}

/* Text */
.toggle-text {
    font-size: 16px;
    user-select: none;
    font-weight: bold;
}
</style>
</head>

<body>
<span class="toggle-text">Player Resize</span>
<input type="checkbox" id="toggle">
<label for="toggle" class="toggle-label"></label>

<script src="popup.js"></script>
</body>
</html>
